name: RunGuard

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - RUNGUARD_ENV=${RUNGUARD_ENV:-local}
      - RUNGUARD_LOG_LEVEL=${RUNGUARD_LOG_LEVEL:-INFO}
      - RUNGUARD_K8S_NAMESPACE=${RUNGUARD_K8S_NAMESPACE:-runguard}
    volumes:
      - ~/.kube:/root/.kube:ro
      - audit-data:/app/data/audit
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ui:
    build: .
    command: ["streamlit", "run", "runguard/ui/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
      - PYTHONPATH=/app
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  audit-data:

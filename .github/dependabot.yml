version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "pre-commit"
      runtime-dependencies:
        patterns:
          - "fastapi"
          - "pydantic"
          - "anthropic"
          - "kubernetes"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - ci
      - automated
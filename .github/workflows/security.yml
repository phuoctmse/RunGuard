name: Security

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday 8am UTC
  pull_request:
    branches: [v2, main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.25.10"
  PYTHON_VERSION: "3.14"
  GO_MODULES: "services/api-gateway services/backend services/operator shared/types"

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [go, python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        if: matrix.language == 'go'
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set GOROOT for CodeQL
        if: matrix.language == 'go'
        run: echo "GOROOT=$(go env GOROOT)" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        if: matrix.language == 'python'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        if: matrix.language == 'python'
        working-directory: services/reasoner
        run: pip install -e ".[dev]"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        continue-on-error: true
        run: semgrep ci --config auto --sarif --output=semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF
        if: hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  go-supply-chain:
    name: Go Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          for d in ${{ env.GO_MODULES }}; do (cd $d && govulncheck ./...) || exit 1; done

      - name: Verify Go module checksums
        run: |
          go work sync
          for dir in services/api-gateway services/backend services/operator shared/types; do
            echo "Verifying $dir..."
            cd $dir && go mod verify && cd ../..
          done

  python-supply-chain:
    name: Python Supply Chain
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/reasoner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-path: services/reasoner/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: pip-audit
        run: |
          python -m pip install --upgrade pip>=26.1 
          python -m pip install pip-audit
          pip-audit --desc --ignore-vuln CVE-2026-3219 --ignore-vuln CVE-2026-6357 || true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          path: services/reasoner

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: python-sbom
          path: sbom.spdx.json
          retention-days: 90

  notify-failure:
    needs: [codeql, semgrep, go-supply-chain, python-supply-chain]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        if: env.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Security scan failed on ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Security Scan Failed* on `${{ github.repository }}`\nBranch: `${{ github.ref_name }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
